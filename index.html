<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Rhino Digital | Premium Digital Marketing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* === CSS RESET & BASE VARIABLES === */
        :root {
            --primary-red: #cc0000;
            --dark-red: #3a0000;
            --black: #050505;
            --text-light: #ffffff;
            --text-muted: #a0a0a0;
            --btn-bg-start: rgba(60, 60, 60, 0.4);
            --btn-bg-end: rgba(10, 10, 10, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--black);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        /* === BACKGROUND EFFECTS === */
        .bg-gradient {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 30%, var(--dark-red) 0%, #150000 50%, var(--black) 100%);
            z-index: -3;
        }

        .bg-noise {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            opacity: 0.03;
            pointer-events: none;
            z-index: -2;
        }

        .bg-rhino {
            position: fixed;
            bottom: -20vh;
            left: -10vw;
            height: 130vh;
            width: auto;
            opacity: 0.1;
            transform: rotate(-25deg);
            pointer-events: none;
            z-index: -1;
            filter: drop-shadow(0 0 20px var(--primary-red));
        }

        /* Subtle cursor glow */
        .cursor-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(204, 0, 0, 0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: -1;
            transition: opacity 0.3s ease;
        }

        /* === MAIN CONTAINER === */
        .main-container {
            width: 100%;
            max-width: 550px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        /* === HEADER === */
        .header {
            text-align: center;
            margin-bottom: 40px;
            opacity: 0;
            animation: slideDownFade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .logo-container {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(204, 0, 0, 0.2);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            overflow: hidden;
        }

        .logo-container:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 30px rgba(204, 0, 0, 0.4);
        }

        .logo-container img {
            width: 80%;
            height: auto;
        }

        .brand-name {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            background: linear-gradient(180deg, #ffffff 0%, #d4d4d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .tagline {
            font-size: 0.9rem;
            font-weight: 300;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* === BUTTONS === */
        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-btn {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
            height: 70px;
            background: linear-gradient(90deg, var(--btn-bg-start) 0%, var(--btn-bg-end) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            text-decoration: none;
            color: var(--text-light);
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
            transform: translateY(20px);
        }

        /* Sequential Animation for Buttons */
        .link-btn:nth-child(1) { animation: slideUpFade 0.8s 0.2s forwards; }
.link-btn:nth-child(2) { animation: slideUpFade 0.8s 0.3s forwards; }
.link-btn:nth-child(3) { animation: slideUpFade 0.8s 0.4s forwards; }
.link-btn:nth-child(4) { animation: slideUpFade 0.8s 0.5s forwards; }
.link-btn:nth-child(5) { animation: slideUpFade 0.8s 0.6s forwards; }
.link-btn:nth-child(6) { animation: slideUpFade 0.8s 0.7s forwards; }
.link-btn:nth-child(7) { animation: slideUpFade 0.8s 0.8s forwards; }

        /* Light Sweep Effect */
        .link-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-20deg);
            transition: left 0.7s ease;
        }

        /* Icon Container */
        .btn-icon {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-left: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.4s ease, background 0.4s ease;
        }

        .btn-icon svg {
            width: 24px;
            height: 24px;
            fill: #ffffff;
            transition: transform 0.4s ease;
        }

        /* Button Text */
        .btn-text {
            flex-grow: 1;
            text-align: center;
            padding-right: 62px; /* Offset to perfectly center text ignoring left icon */
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* Hover States */
        .link-btn:hover {
            transform: translateY(-4px) scale(1.01);
            border-color: rgba(204, 0, 0, 0.4);
            box-shadow: 0 15px 25px rgba(0,0,0,0.5), 0 0 20px rgba(204, 0, 0, 0.15);
            background: linear-gradient(90deg, rgba(80, 80, 80, 0.5) 0%, rgba(15, 15, 15, 0.9) 100%);
        }

        .link-btn:hover::before {
            left: 200%;
        }

        .link-btn:hover .btn-icon {
            transform: scale(1.1);
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.2);
        }

        /* Active/Click State */
        .link-btn:active {
            transform: translateY(2px) scale(0.98);
            box-shadow: 0 5px 10px rgba(0,0,0,0.5);
        }

        /* === KEYFRAMES === */
        @keyframes slideDownFade {
            0% { opacity: 0; transform: translateY(-30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* === RESPONSIVE === */
        @media (max-width: 600px) {
            .brand-name { font-size: 1.8rem; }
            .tagline { font-size: 0.8rem; letter-spacing: 1px; }
            .link-btn { height: 64px; border-radius: 32px; }
            .btn-icon { width: 48px; height: 48px; }
            .btn-text { font-size: 0.95rem; padding-right: 56px; }
            .bg-rhino { height: 50vh; opacity: 0.04; }
        }
    </style>
</head>

            // Check if device supports hover (ignores mobile touch for performance)
            const isHoverableDevice = window.matchMedia('(hover: hover) and (pointer: fine)').matches;

            if (isHoverableDevice) {
                document.addEventListener('mousemove', (e) => {
                    const x = e.clientX;
                    const y = e.clientY;

                    // 1. Move Cursor Glow
                    glow.style.left = `${x}px`;
                    glow.style.top = `${y}px`;

                    // 2. Subtle Parallax for Rhino Background
                    // Calculate distance from center (-1 to 1)
                    const xOffset = (x / window.innerWidth - 0.5) * 2;
                    const yOffset = (y / window.innerHeight - 0.5) * 2;
                    
                    // Move rhino slightly based on mouse position (max 15px)
                    const moveX = xOffset * 15;
                    const moveY = yOffset * 15;
                    
                });
            }
        });
